name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src/thesean/ tests/
      - run: mypy src/thesean/
      - run: pytest tests/ -q -m "not f1"

  f1-smoke:
    timeout-minutes: 30
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python -m pip install -e ".[dev]"
      - run: pytest tests/ -q -m "f1"
        env:
          THESEAN_F1_REPO: ${{ vars.THESEAN_F1_REPO }}
